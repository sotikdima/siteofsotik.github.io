<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site of Sotik</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fafafa;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      max-width: 720px;
      width: 100%;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.08);
      padding: 40px;
    }
    h1 {
      margin-top: 0;
      font-size: 2.4rem;
    }
    p {
      line-height: 1.7;
      margin-bottom: 24px;
    }
    a.button {
      display: inline-block;
      padding: 14px 24px;
      background: #1a73e8;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      font-weight: 600;
      transition: background .15s ease, transform .15s ease;
    }
    a.button:hover {
      background: #1558b5;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Site of Sotik</h1>
    <p>Добро пожаловать на сайт. Здесь вы можете найти полезный контент, новости и обновления проекта.</p>
    <p>Если хотите поддержать развитие сайта, перейдите на страницу доната.</p>
    <a class="button" href="/donate/">Поддержать проект</a>
  </div>
</body>
</html>
